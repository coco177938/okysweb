  <script>
    function copyToClipboard(text) {
      var tempInput = document.createElement("input");
      tempInput.value = text;
      document.body.appendChild(tempInput);
      tempInput.select();
      document.execCommand("copy");
      document.body.removeChild(tempInput);
      alert("已复制到剪贴板：" + text);
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

  <!-- 粒子配置 -->
  <script>
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

const pcConfig = {
  particles: {
    number: { value: 120, density: { enable: true, value_area: 800 } }, // 数量更多
    color: { value: ["#ffffff", "#4285F4", "#34A853", "#FBBC05", "#EA4335", "#ff00ff", "#00ffff"] }, // 增加荧光色
    shape: { type: ["circle", "star", "triangle"] }, // 多种形状
    opacity: { value: 0.7, random: true },
    size: { value: 4, random: true },
    line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.25, width: 1 },
    move: { 
      enable: true, 
      speed: 5, 
      direction: "none", 
      random: true, 
      straight: false, 
      out_mode: "out", 
      bounce: false 
    }
  },
  interactivity: {
    events: { 
      onhover: { enable: true, mode: "repulse" }, // 鼠标悬停时粒子散开
      onclick: { enable: true, mode: "push" }     // 点击时增加粒子
    },
    modes: { 
      repulse: { distance: 200, duration: 0.4 },
      push: { particles_nb: 6 }
    }
  },
  retina_detect: true
};

const mobileConfig = {
  particles: {
    number: { value: 40, density: { enable: false } },
    color: { value: ["#ffffff", "#4285F4", "#34A853", "#FBBC05", "#EA4335", "#ff00ff", "#00ffff"] }, // 增加荧光色
    shape: { type: ["circle", "star", "triangle"] }, // ✅ 保留星星和三角形
    opacity: { value: 0.8, random: true },
    size: { value: 2.5, random: true },
    line_linked: { enable: true },
    move: { 
      enable: true, 
      speed: 3, 
      direction: "none", 
      random: true, 
      straight: false, 
      out_mode: "out" 
    }
  },
  interactivity: { 
    events: { 
      onhover: { enable: false }, 
      onclick: { enable: false } 
    } 
  },
  retina_detect: true
};

// 根据设备选择配置
particlesJS("particles-js", isMobile ? mobileConfig : pcConfig);




  </script>
